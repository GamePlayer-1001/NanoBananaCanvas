# ============================================
# Nano Banana Canvas — CI/CD Pipeline
# GitHub Actions → Cloudflare Workers + Assets
# ============================================
# 触发: push main → 构建+部署 | PR → 仅构建+检查
# 部署: Web(OpenNext→Workers) + API(Hono→Workers)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.26.2'
  PLAYWRIGHT_CACHE_DIR: ~/.cache/ms-playwright

jobs:
  # ── CI: 代码质量检查 (每次 push/PR) ────────
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Configure pnpm store
        run: pnpm config set store-dir .pnpm-store

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/**/package.json', 'packages/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_CACHE_DIR }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: pnpm --filter @nano-banana/e2e exec playwright install --with-deps chromium

      - run: pnpm lint

      - run: pnpm test
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_DEFAULT_CURRENCY: ${{ vars.STRIPE_DEFAULT_CURRENCY }}
          STRIPE_PORTAL_CONFIGURATION_ID: ${{ vars.STRIPE_PORTAL_CONFIGURATION_ID }}
          STRIPE_PRICE_STANDARD_PLAN_AUTO_MONTHLY: ${{ vars.STRIPE_PRICE_STANDARD_PLAN_AUTO_MONTHLY }}
          STRIPE_PRICE_PRO_PLAN_AUTO_MONTHLY: ${{ vars.STRIPE_PRICE_PRO_PLAN_AUTO_MONTHLY }}
          STRIPE_PRICE_ULTIMATE_PLAN_AUTO_MONTHLY: ${{ vars.STRIPE_PRICE_ULTIMATE_PLAN_AUTO_MONTHLY }}
          STRIPE_PRICE_STANDARD_PLAN_ONE_TIME: ${{ vars.STRIPE_PRICE_STANDARD_PLAN_ONE_TIME }}
          STRIPE_PRICE_PRO_PLAN_ONE_TIME: ${{ vars.STRIPE_PRICE_PRO_PLAN_ONE_TIME }}
          STRIPE_PRICE_ULTIMATE_PLAN_ONE_TIME: ${{ vars.STRIPE_PRICE_ULTIMATE_PLAN_ONE_TIME }}
          STRIPE_PRICE_CREDIT_PACK_500: ${{ vars.STRIPE_PRICE_CREDIT_PACK_500 }}
          STRIPE_PRICE_CREDIT_PACK_1200: ${{ vars.STRIPE_PRICE_CREDIT_PACK_1200 }}
          STRIPE_PRICE_CREDIT_PACK_3500: ${{ vars.STRIPE_PRICE_CREDIT_PACK_3500 }}
          STRIPE_PRICE_CREDIT_PACK_8000: ${{ vars.STRIPE_PRICE_CREDIT_PACK_8000 }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

      - name: Build shared workspace package
        run: pnpm --filter @nano-banana/shared build

      - name: Build API worker bundle
        run: pnpm --filter @nano-banana/worker build

      - name: Build web for Cloudflare
        working-directory: apps/web
        run: pnpm run deploy:build
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Upload OpenNext artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: web-open-next
          path: apps/web/.open-next
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  # ── Deploy: 推送 main 时自动部署 ───────────
  deploy:
    name: Deploy
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Configure pnpm store
        run: pnpm config set store-dir .pnpm-store

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Download OpenNext artifact
        uses: actions/download-artifact@v4
        with:
          name: web-open-next
          path: apps/web/.open-next

      - run: pnpm install --frozen-lockfile

      - name: Apply D1 schema migrations
        working-directory: apps/web
        run: pnpm run db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── 1. 先确保 Queue 存在，再发布引用它的 Worker ──
      - name: Ensure task queue exists
        run: |
          set +e
          output=$(pnpm dlx wrangler@4 queues create nano-banana-tasks 2>&1)
          status=$?
          set -e
          echo "$output"

          if [ $status -eq 0 ]; then
            exit 0
          fi

          echo "$output" | grep -Eqi "already exists|already taken|code: 11009"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync platform secrets to Web Worker
        working-directory: apps/web
        shell: bash
        run: |
          printf '%s' "$COMFLY_API_KEY" | pnpm dlx wrangler@4 secret put COMFLY_API_KEY
          printf '%s' "$DLAPI_API_KEY" | pnpm dlx wrangler@4 secret put DLAPI_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMFLY_API_KEY: ${{ secrets.COMFLY_API_KEY }}
          DLAPI_API_KEY: ${{ secrets.DLAPI_API_KEY }}

      # ── 2. 部署前端 → Cloudflare Workers ──────
      - name: Deploy Web
        working-directory: apps/web
        run: pnpm dlx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync platform secrets to API Worker
        working-directory: apps/worker
        shell: bash
        run: |
          printf '%s' "$COMFLY_API_KEY" | pnpm dlx wrangler@4 secret put COMFLY_API_KEY
          printf '%s' "$DLAPI_API_KEY" | pnpm dlx wrangler@4 secret put DLAPI_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMFLY_API_KEY: ${{ secrets.COMFLY_API_KEY }}
          DLAPI_API_KEY: ${{ secrets.DLAPI_API_KEY }}

      # ── 3. 部署 API Worker → Cloudflare Workers ──
      - name: Deploy API Worker
        working-directory: apps/worker
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
