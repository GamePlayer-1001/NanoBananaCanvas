# ============================================================
# Nano Banana Canvas — API Worker
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# ============================================================

name = "nano-banana-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 数据库 ──────────────────────────────────────────────
# [[d1_databases]]
# binding = "DB"
# database_name = "nano-banana-db"
# database_id = "<your-d1-id>"

# ─── R2 存储桶 ──────────────────────────────────────────────
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "nano-banana-uploads"

# ─── Queue 异步任务 ─────────────────────────────────────────
# [[queues.producers]]
# binding = "TASK_QUEUE"
# queue = "nano-banana-tasks"
#
# [[queues.consumers]]
# queue = "nano-banana-tasks"
# max_batch_size = 10
# max_batch_timeout = 30

# ─── 环境变量 ───────────────────────────────────────────────
[vars]
ENVIRONMENT = "development"
