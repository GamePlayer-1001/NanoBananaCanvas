# ============================================================
# Nano Banana Canvas — API Worker
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# ============================================================

name = "nano-banana-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 数据库 (与 apps/web/wrangler.jsonc 同步) ─────────────
[[d1_databases]]
binding = "DB"
database_name = "nano-banana-canvas-db"
database_id = "8a9c60d1-9797-4ea4-8fa6-2d55a1176b0a"

# ─── R2 存储桶 (与 apps/web/wrangler.jsonc 同步) ─────────────
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "nano-banana-uploads"

# ─── Queue 异步任务 (图片后台执行消费者) ───────────────────
[[queues.consumers]]
queue = "nano-banana-tasks"
max_batch_size = 10
max_batch_timeout = 30

# ─── Workflows 长任务编排 (image_gen 主调度骨架) ───────────
[[workflows]]
binding = "IMAGE_TASK_WORKFLOW"
name = "nano-banana-image-task"
class_name = "ImageTaskWorkflow"

# ─── KV 命名空间 (与 apps/web/wrangler.jsonc 同步) ─────────
[[kv_namespaces]]
binding = "KV"
id = "f8140250229b4287a07afedbf6170fcf"

# ─── Cron Triggers (每 10 分钟: 文件清理 + 超时扫描) ─
[triggers]
crons = ["*/10 * * * *"]

# ─── 环境变量 ───────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
TASK_IMAGE_ORCHESTRATOR = "workflow"
